name: local-math-rag

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
    environment:
      PYTHONPATH: /app/src
      LOOKUP_TOOL_MODEL_ENABLED: "true"
      LOOKUP_TOOL_MODEL_BASE_URL: http://llama:8080/v1
      LOOKUP_TOOL_MODEL_ID: /models/Qwen3-8B-Q4_K_M.gguf
      LOOKUP_TOOL_LOCAL_MODELS_DIR: /app/data/models
      LOOKUP_TOOL_LOCAL_MODEL_PATH: /app/data/models/Qwen3-8B-Q4_K_M.gguf
    command: ["python", "-m", "lookup_tool.cli", "serve", "--host", "0.0.0.0", "--port", "8765"]

  llama-cpu:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: ["llama-cpu"]
    ports:
      - "8080:8080"
    volumes:
      - ./data/models:/models:ro
    networks:
      default:
        aliases:
          - llama
    command:
      - "-m"
      - "/models/Qwen3-8B-Q4_K_M.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--ctx-size"
      - "8192"
      - "--reasoning"
      - "off"

  llama-cuda:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    profiles: ["llama-cuda"]
    ports:
      - "8080:8080"
    volumes:
      - ./data/models:/models:ro
    networks:
      default:
        aliases:
          - llama
    gpus: all
    command:
      - "-m"
      - "/models/Qwen3-8B-Q4_K_M.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--ctx-size"
      - "8192"
      - "--n-gpu-layers"
      - "999"
      - "--reasoning"
      - "off"
