name: contracts

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate contracts
        run: python tests/test_contracts.py
      - name: Build Windows launcher
        run: dotnet build launcher/LocalMathRAGFlow/LocalMathRAGFlow.csproj -c Release
